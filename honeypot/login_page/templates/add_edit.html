{% extends 'base.html' %}

{% block content %}
<style>
    .form-container {
        max-width: 600px;
        margin: 0 auto;
    }

    .form-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .form-header h1 {
        font-size: 32px;
        color: white;
        margin-bottom: 8px;
    }

    .form-header p {
        color: var(--text-secondary);
    }
    
    .btn-secondary {
        background: transparent;
        border: 1px solid var(--glass-border);
        color: var(--text-secondary);
        transition: all 0.3s;
    }
    
    .btn-secondary:hover {
        background: rgba(255,255,255,0.05);
        color: white;
    }
    
    .form-actions {
        display: flex;
        gap: 16px;
        margin-top: 32px;
    }
    
    .form-actions button, .form-actions a {
        flex: 1;
    }
</style>

<div class="form-container">
    <div class="glass-panel">
        <div class="form-header">
            <h1>{{ action }} Student</h1>
            <p>Fill out the database fields below</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" autocomplete="name" required
                       value="{{ student.name if student else '' }}" placeholder="e.g. Jane Doe">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Campus Email Address</label>
                <input type="email" id="email" name="email" class="form-control" autocomplete="email" required
                       value="{{ student.email if student else '' }}" placeholder="student@nexus.edu">
            </div>

            <div class="form-group">
                <label class="form-label" for="course">Assigned Course / Major</label>
                <input type="text" id="course" name="course" class="form-control" required
                       value="{{ student.course if student else '' }}" placeholder="e.g. Computer Science 101">
            </div>

            <div class="form-actions">
                <a href="{{ url_for('index') }}" class="btn btn-secondary" style="text-align: center;">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa-solid {% if action == 'Edit' %}fa-save{% else %}fa-user-plus{% endif %}"></i> 
                    {% if action == 'Edit' %}Save Changes{% else %}Add Student{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
